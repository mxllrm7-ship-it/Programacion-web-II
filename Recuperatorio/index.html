<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CRUD Preguntas</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">
    <div class="nav">
        <button onclick="irJuego()">Jugar</button>
        <button onclick="irCrud()">Ver Preguntas</button>
    </div>

    <h2>CRUD Preguntas</h2>

    <form id="formPregunta">
        <input type="hidden" id="editId">

        <label>Pregunta</label>
        <input type="text" id="pregunta" required>

        <div class="opciones">
            <div class="opcion">
                <input type="radio" name="correcta" value="A" required>
                <input type="text" id="A" placeholder="Opción A" required>
            </div>

            <div class="opcion">
                <input type="radio" name="correcta" value="B">
                <input type="text" id="B" placeholder="Opción B" required>
            </div>

            <div class="opcion">
                <input type="radio" name="correcta" value="C">
                <input type="text" id="C" placeholder="Opción C" required>
            </div>

            <div class="opcion">
                <input type="radio" name="correcta" value="D">
                <input type="text" id="D" placeholder="Opción D" required>
            </div>
        </div>

        <button type="submit">Guardar</button>
    </form>

    <h3>Preguntas</h3>
    <div id="lista"></div>

    <h3>Juegos Registrados</h3>
    <div id="listaJuegos"></div>
</div>

<script>
function irJuego() {
    window.location.href = "juego.html";
}
function irCrud() {
    window.location.href = "index.html";
}
</script>

<script src="createquestion.js"></script>
</body>
</html>
